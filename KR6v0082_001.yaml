body:
  text: 録文六地藏菩薩十齊日一日童子下念定光如來佛不墮刀槍地獄持齊除罪四十劫八日太子下念藥師琉璃光佛不墮糞屎地獄持齊除罪三十劫十四日察命下念賢劫千佛不墮鑊湯地獄持齊除罪一千劫十五日五道大將軍下念阿彌陀佛不墮寒冰地獄持齊除罪二百劫十八日閻羅王下念觀世音菩薩不墮劍樹地獄持齊除罪九十劫二十三日天大將軍下念盧舍那佛不墮餓鬼地獄持齊除罪一千劫二十四日太山府君下念地藏菩薩不墮斬斫地獄持齊除罪一千劫二十八日帝釋下念阿彌陀佛不墮鐵鋸地獄持齊除罪九十劫二十九日四天王下念藥王藥上菩薩不墮磑磨地獄持齊除罪七千劫三十日梵天王下念釋迦牟尼佛不墮灰河地獄持齊除罪八千劫録文完
